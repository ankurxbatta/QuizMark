[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = [".venv-test"]

[tool.ruff.lint]
select = ["E", "F", "W"]
# E501: long lines are common in prompts/log strings.
# E702/E741: existing codebase idioms (`x; continue` retry pattern, short loop vars).
ignore = ["E501", "E702", "E741"]

[tool.ruff.lint.per-file-ignores]
# pdf_extractor deliberately imports shared helpers after its module constants.
"app/services/pdf_extractor.py" = ["E402"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

services:

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - app-network

  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      broker:
        condition: service_started
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    volumes:
      - ./data/uploads:/app/uploads
      - ./Book:/app/Book:ro
    restart: unless-stopped
    networks:
      - app-network

  # ── Worker: Ingest (PDF parse, chunking, orchestration) ───────────────────────
  # Handles: ingest_book_resumable_task, ingest_pdf_task
  worker-ingest:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker -Q ingest_tasks -n ingest@%h --concurrency=2 --loglevel=info
    env_file:
      - .env
    depends_on:
      - broker
      - mongodb
    volumes:
      - ./data/uploads:/app/uploads
      - ./Book:/app/Book:ro
    restart: unless-stopped
    networks:
      - app-network

  # ── Worker: Vision (chart/image descriptions via Gemini → OpenAI → Anthropic) ─
  # Memory-limited: image bytes are large. Concurrency=1 to respect free-tier limits.
  worker-vision:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker -Q vision_tasks -n vision@%h --concurrency=1 --loglevel=info
    env_file:
      - .env
    depends_on:
      - broker
      - mongodb
    mem_limit: 1g
    restart: unless-stopped
    networks:
      - app-network

  # ── Worker: Math (formula extraction via OpenAI → Anthropic) ─────────────────
  worker-math:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker -Q math_tasks -n math@%h --concurrency=2 --loglevel=info
    env_file:
      - .env
    depends_on:
      - broker
      - mongodb
    restart: unless-stopped
    networks:
      - app-network

  # ── Worker: Clean (PDF noise removal, CPU-only, no API calls) ─────────────────
  # High concurrency — this is pure Python text processing, no I/O bottleneck.
  worker-clean:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker -Q clean_tasks -n clean@%h --concurrency=4 --loglevel=info
    env_file:
      - .env
    depends_on:
      - broker
      - mongodb
    restart: unless-stopped
    networks:
      - app-network

  # ── Worker: Embed (embedding generation via Gemini → OpenAI) ──────────────────
  worker-embed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker -Q embed_tasks -n embed@%h --concurrency=3 --loglevel=info
    env_file:
      - .env
    depends_on:
      - broker
      - mongodb
    restart: unless-stopped
    networks:
      - app-network

  # ── Worker: DeepSearch (multi-query RAG retrieval for question generation) ─────
  # Runs vector searches + sub-query decomposition. Separated so retrieval
  # bottlenecks never slow down the generation or marking workers.
  worker-deepsearch:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker -Q deepsearch_tasks -n deepsearch@%h --concurrency=3 --loglevel=info
    env_file:
      - .env
    depends_on:
      - broker
      - mongodb
    restart: unless-stopped
    networks:
      - app-network

  # ── Worker: Generation (question generation via OpenAI → Anthropic → Gemini) ──
  worker-gen:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker -Q gen_tasks -n gen@%h --concurrency=2 --loglevel=info
    env_file:
      - .env
    depends_on:
      - broker
      - mongodb
    restart: unless-stopped
    networks:
      - app-network

  # ── Worker: Marking (answer marking via Mistral → Groq → OpenAI) ──────────────
  worker-mark:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker -Q mark_tasks -n mark@%h --concurrency=4 --loglevel=info
    env_file:
      - .env
    depends_on:
      - broker
      - mongodb
    restart: unless-stopped
    networks:
      - app-network

  # ── Flower (Celery task dashboard — replaces any custom manager containers) ─────
  # Dashboard at http://localhost:5555
  # Shows all queues, workers, tasks, retries, and failure rates live.
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - broker
    restart: unless-stopped
    networks:
      - app-network

  # ── Infrastructure ─────────────────────────────────────────────────────────────
  broker:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - app-network

  mongodb:
    image: mongodb/mongodb-atlas-local:latest
    hostname: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
      - mongoconfigdata:/data/configdb
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval \"db.hello().isWritablePrimary || quit(1)\" --quiet"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - app-network

  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017/?directConnection=true
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mongodata:
  mongoconfigdata:

networks:
  app-network:
    driver: bridge

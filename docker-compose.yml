services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      broker:
        condition: service_started
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    volumes:
      - ./data/uploads:/app/uploads
      - ./Book:/app/Book:ro
    restart: unless-stopped
    networks:
      - app-network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    depends_on:
      - broker
      - mongodb
    volumes:
      - ./data/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - app-network

  broker:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - app-network

  mongodb:
    image: mongodb/mongodb-atlas-local:latest
    hostname: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
      - mongoconfigdata:/data/configdb
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval \"db.hello().isWritablePrimary || quit(1)\" --quiet"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - app-network

  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017/?directConnection=true
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mongodata:
  mongoconfigdata:

networks:
  app-network:
    driver: bridge
